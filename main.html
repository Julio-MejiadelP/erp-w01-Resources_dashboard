<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERP W01 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            font-family: Arial, sans-serif !important;
        }
        .color-midnight { background-color: #0E1020; color: white; }
        .color-white { background-color: #FFFFFF; }
        .color-canvas { background-color: #F6F3F0; }
        .color-peach { background-color: #FFC982; }
        .color-sky { background-color: #A1E6FF; }
        .color-gold { background-color: #FFAE41; }
        .color-true-blue { background-color: #4995FF; }
        .color-melon { background-color: #FF7E51; }
        .color-red { background-color: #D14600; color: white; }
        .color-royal { background-color: #004AAC; color: white; }
        .bg-canvas { background-color: #F6F3F0; }
    </style>
</head>
<body class="bg-canvas" style="font-family: Arial, sans-serif;">
    <div id="app"></div>

    <script>
        let rawData = [];
        let data = [];
        let activeTab = 1;

        const months = ['Jan 2026','Feb 2026','Mar 2026','Apr 2026','May 2026','Jun 2026','Jul 2026','Aug 2026','Sep 2026','Oct 2026','Nov 2026','Dec 2026','Jan 2027','Feb 2027','Mar 2027','Apr 2027','May 2027','Jun 2027','Jul 2027','Aug 2027','Sep 2027','Oct 2027','Nov 2027','Dec 2027'];

        function isOver(r) {
            return r.w01 > 1.0;
        }

        function aggregateData() {
            const byResource = {};
            rawData.forEach(row => {
                const name = row['Resource _Name'];
                if (!byResource[name]) {
                    byResource[name] = {
                        name: name,
                        w01: 0,
                        country: row.Assigned_Country,
                        groups: []
                    };
                }
                byResource[name].w01 += parseFloat(row.W01_Allocation) || 0;
                if (!byResource[name].groups.includes(row.Group)) {
                    byResource[name].groups.push(row.Group);
                }
            });
            
            data = Object.values(byResource).sort((a,b) => b.w01 - a.w01);
        }

        function exportToExcel(sheetName, data, headers) {
            const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            const timestamp = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `ERP_W01_${sheetName}_${timestamp}.xlsx`);
        }

        function exportExecutive() {
            const countryData = {};
            data.forEach(r => {
                const c = r.country || 'Unknown';
                if (!countryData[c]) countryData[c] = {total: 0, over: 0};
                countryData[c].total++;
                if (isOver(r)) countryData[c].over++;
            });
            
            const exportData = Object.entries(countryData)
                .sort((a,b) => b[1].total - a[1].total)
                .map(([country, count]) => [
                    country,
                    count.total,
                    count.over,
                    `${((count.over/count.total)*100).toFixed(1)}%`
                ]);
            
            exportToExcel('Executive', exportData, ['Country', 'Total', 'Over', '%']);
        }

        function exportResources() {
            const exportData = data
                .sort((a,b) => b.w01 - a.w01)
                .map(r => {
                    const email = rawData.find(row => row['Resource _Name'] === r.name)?.Resource || 'N/A';
                    const projects = [...new Set(rawData.filter(row => row['Resource _Name'] === r.name).map(row => row.Project_Ref))].join('; ');
                    return [r.name, email, r.w01.toFixed(2), isOver(r) ? 'YES' : 'NO', projects];
                });
            
            exportToExcel('Resources', exportData, ['Name', 'Email', 'W01', 'Over', 'Projects']);
        }

        function exportGroups() {
            const byGroup = {};
            rawData.forEach(row => {
                if (!byGroup[row.Group]) byGroup[row.Group] = new Set();
                byGroup[row.Group].add(row['Resource _Name']);
            });

            const exportData = Object.entries(byGroup)
                .sort((a,b) => b[1].size - a[1].size)
                .map(([group, resources]) => {
                    const groupOver = data.filter(d => d.groups.includes(group) && isOver(d)).length;
                    return [group, resources.size, groupOver];
                });
            
            exportToExcel('Groups', exportData, ['Group', 'Total Resources', 'Over-allocated']);
        }

        function exportProjects() {
            const byProject = {};
            rawData.forEach(row => {
                if (!byProject[row.Project_Ref]) byProject[row.Project_Ref] = new Set();
                byProject[row.Project_Ref].add(row['Resource _Name']);
            });

            const exportData = Object.entries(byProject)
                .sort()
                .map(([project, resources]) => {
                    return [project, resources.size, Array.from(resources).join('; ')];
                });
            
            exportToExcel('Projects', exportData, ['Project', 'Total Resources', 'Resource List']);
        }

        function exportOverallocated() {
            const over = data.filter(d => isOver(d)).sort((a,b) => b.w01 - a.w01);
            
            const exportData = over.map(r => {
                const email = rawData.find(row => row['Resource _Name'] === r.name)?.Resource || 'N/A';
                const projects = [...new Set(rawData.filter(row => row['Resource _Name'] === r.name).map(row => row.Project_Ref))].join('; ');
                return [r.name, email, r.w01.toFixed(2), projects];
            });
            
            exportToExcel('OverAllocated', exportData, ['Name', 'Email', 'W01', 'Projects']);
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const bytes = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(bytes, {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    rawData = XLSX.utils.sheet_to_json(ws).filter(r => r.Resource && r.Project_Ref);
                    
                    aggregateData();
                    const over = data.filter(d => isOver(d)).length;
                    document.getElementById('fileName').innerText = `${file.name} | ${rawData.length} asignaciones | ${data.length} recursos | ${over} over`;
                    render();
                } catch(err) {
                    alert('Error: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function renderExecutive() {
            const over = data.filter(d => isOver(d));
            const optimal = data.length - over.length;
            const projects = new Set(rawData.map(r => r.Project_Ref)).size;
            const groups = new Set(rawData.map(r => r.Group)).size;
            const countries = new Set(rawData.map(r => r.Assigned_Country)).size;
            
            return `
                <div class="space-y-4">
                    <!-- KPIs -->
                    <div class="grid grid-cols-6 gap-2">
                        <div class="color-true-blue text-white p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">ASSIGNMENTS</p>
                            <p class="text-2xl font-bold">${rawData.length}</p>
                        </div>
                        <div class="color-royal p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">UNIQUE RESOURCES</p>
                            <p class="text-2xl font-bold">${data.length}</p>
                        </div>
                        <div class="color-red p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">OVER-ALLOCATED</p>
                            <p class="text-2xl font-bold">${over.length}</p>
                        </div>
                        <div class="color-gold text-black p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">OPTIMAL</p>
                            <p class="text-2xl font-bold">${optimal}</p>
                        </div>
                        <div class="color-peach text-black p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">PROJECTS</p>
                            <p class="text-2xl font-bold">${projects}</p>
                        </div>
                        <div class="color-sky text-black p-4 rounded shadow" style="font-family: Arial;">
                            <p class="text-xs font-bold">COUNTRIES</p>
                            <p class="text-2xl font-bold">${countries}</p>
                        </div>
                    </div>

                    <!-- 2 Gráficas Top -->
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-4 rounded shadow" style="max-height: 250px; font-family: Arial;">
                            <canvas id="chart1" height="60"></canvas>
                            <p class="text-xs text-center font-bold mt-2">FTE per Project</p>
                        </div>
                        <div class="bg-white p-4 rounded shadow" style="max-height: 250px; font-family: Arial;">
                            <canvas id="chart2" height="60"></canvas>
                            <p class="text-xs text-center font-bold mt-2">Over-allocated by Team</p>
                        </div>
                    </div>

                    <!-- Project Timeline (Inicio - Fin) -->
                    <div class="bg-white p-4 rounded shadow" style="font-family: Arial;">
                        <h3 class="text-lg font-bold mb-3">📅 Project Timeline (Start - End)</h3>
                        <div style="max-height: 300px; overflow-y: auto;">
                            <canvas id="chart5" height="250"></canvas>
                        </div>
                    </div>

                    <!-- Resources by Country -->
                    <div class="bg-white p-4 rounded shadow" style="font-family: Arial;">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-bold">📍 Resources by Country</h3>
                            <button onclick="exportExecutive()" class="bg-gold text-black px-3 py-1 rounded text-xs font-bold hover:opacity-90">📥 Export</button>
                        </div>
                        <div style="max-height: 250px; overflow-y: auto;">
                            <table class="w-full text-sm">
                                <thead class="sticky top-0 bg-canvas">
                                    <tr style="font-family: Arial;">
                                        <th class="text-left p-2 font-bold">Country</th>
                                        <th class="text-center p-2 font-bold">Total</th>
                                        <th class="text-center p-2 font-bold">Over</th>
                                        <th class="text-center p-2 font-bold">%</th>
                                    </tr>
                                </thead>
                                <tbody style="font-family: Arial;">
                                    ${(() => {
                                        const byCountry = {};
                                        data.forEach(r => {
                                            const c = r.country || 'Unknown';
                                            if (!byCountry[c]) byCountry[c] = {total: 0, over: 0};
                                            byCountry[c].total++;
                                            if (isOver(r)) byCountry[c].over++;
                                        });
                                        return Object.entries(byCountry)
                                            .sort((a,b) => b[1].total - a[1].total)
                                            .map(([country, count]) => `
                                                <tr class="border-b hover:bg-canvas">
                                                    <td class="p-2">${country.slice(0, 30)}</td>
                                                    <td class="p-2 text-center font-bold">${count.total}</td>
                                                    <td class="p-2 text-center ${count.over > 0 ? 'color-red' : ''}">${count.over}</td>
                                                    <td class="p-2 text-center">${((count.over/count.total)*100).toFixed(0)}%</td>
                                                </tr>
                                            `).join('');
                                    })()}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function drawCharts() {
            setTimeout(() => {
                // Chart 1: FTE por Proyecto
                const projData = {};
                rawData.forEach(row => {
                    projData[row.Project_Ref] = (projData[row.Project_Ref] || 0) + 1;
                });
                const projLabels = Object.keys(projData).sort((a,b) => projData[b] - projData[a]).slice(0, 8);
                const projValues = projLabels.map(p => projData[p]);

                if (document.getElementById('chart1')) {
                    new Chart(document.getElementById('chart1'), {
                        type: 'bar',
                        data: {
                            labels: projLabels.map(p => p.slice(0, 12)),
                            datasets: [{data: projValues, backgroundColor: '#3b82f6'}]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {legend: {display: false}},
                            scales: {x: {ticks: {font: {size: 9}}}}
                        }
                    });
                }

                // Chart 2: Over por Grupo
                const groupOverData = {};
                data.forEach(r => {
                    if (isOver(r)) {
                        r.groups.forEach(g => {
                            groupOverData[g] = (groupOverData[g] || 0) + 1;
                        });
                    }
                });

                const groupLabels = Object.keys(groupOverData).sort((a,b) => groupOverData[b] - groupOverData[a]);
                const groupValues = groupLabels.map(g => groupOverData[g]);

                if (document.getElementById('chart2')) {
                    new Chart(document.getElementById('chart2'), {
                        type: 'bar',
                        data: {
                            labels: groupLabels.map(g => g.slice(0, 12)),
                            datasets: [{data: groupValues, backgroundColor: '#FF7E51'}]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {legend: {display: false}},
                            scales: {x: {ticks: {font: {size: 9}}}}
                        }
                    });
                }

                // Chart 5: Project Timeline (Duración: mes inicio a mes fin)
                const projTimeline = {};
                rawData.forEach(row => {
                    const proj = row.Project_Ref;
                    if (!projTimeline[proj]) {
                        projTimeline[proj] = {start: null, end: null, startMonth: '', endMonth: ''};
                    }
                    months.forEach((m, idx) => {
                        const val = parseFloat(row[m]) || 0;
                        if (val > 0) {
                            if (projTimeline[proj].start === null) {
                                projTimeline[proj].start = idx;
                                projTimeline[proj].startMonth = m;
                            }
                            projTimeline[proj].end = idx;
                            projTimeline[proj].endMonth = m;
                        }
                    });
                });

                const projTimelineLabels = Object.keys(projTimeline)
                    .filter(p => projTimeline[p].start !== null)
                    .sort((a,b) => projTimeline[a].start - projTimeline[b].start)
                    .slice(0, 15);  // Top 15 proyectos
                
                const projTimelineStarts = projTimelineLabels.map(p => projTimeline[p].start);
                const projTimelineDurations = projTimelineLabels.map(p => projTimeline[p].end - projTimeline[p].start + 1);
                const projTimelineInfo = projTimelineLabels.map(p => 
                    `${projTimeline[p].startMonth.slice(0,3)} - ${projTimeline[p].endMonth.slice(0,3)}`
                );

                if (document.getElementById('chart5')) {
                    new Chart(document.getElementById('chart5'), {
                        type: 'bar',
                        data: {
                            labels: projTimelineLabels.map(p => p.slice(0, 20)),
                            datasets: [{
                                label: 'Project Duration (months)',
                                data: projTimelineDurations,
                                backgroundColor: '#A1E6FF',
                                borderColor: '#004AAC',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {display: false},
                                tooltip: {
                                    callbacks: {
                                        afterLabel: function(context) {
                                            return projTimelineInfo[context.dataIndex];
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {max: 24, ticks: {font: {size: 8}}}
                            }
                        }
                    });
                }
            }, 100);
        }

        function renderResources() {
            return `<div style="font-family: Arial;">
                <div class="mb-4 flex justify-between items-center">
                    <h3 class="text-lg font-bold">Resources List</h3>
                    <button onclick="exportResources()" class="bg-gold text-black px-3 py-1 rounded text-xs font-bold hover:opacity-90">📥 Export</button>
                </div>
                <div class="space-y-2 max-h-screen overflow-y-auto">
                    ${data.map((r, idx) => {
                        const email = rawData.find(row => row['Resource _Name'] === r.name)?.Resource || 'N/A';
                        const projects = rawData.filter(row => row['Resource _Name'] === r.name).map(row => row.Project_Ref);
                        const uniqueProjects = [...new Set(projects)];
                        
                        return `
                            <div class="border-l-4 ${isOver(r) ? 'text-white' : 'border-green-500 bg-green-50'} p-2 rounded-r text-xs" style="${isOver(r) ? 'background-color: #D14600;' : ''}">
                                <button onclick="this.parentElement.querySelector('[data-resource-projects-${idx}]').classList.toggle('hidden')" class="w-full text-left hover:opacity-80 flex justify-between items-start">
                                    <div>
                                        <p class="font-bold cursor-pointer">${r.name}</p>
                                        <p class="${isOver(r) ? 'text-gray-200' : 'text-gray-600'} cursor-pointer">${email}</p>
                                    </div>
                                    <p class="font-bold ${isOver(r) ? 'text-white' : 'text-green-700'}">${r.w01.toFixed(2)}</p>
                                </button>
                                <div data-resource-projects-${idx} class="hidden mt-2 pt-2 border-t ${isOver(r) ? 'border-red-400' : 'border-gray-300'}" style="${isOver(r) ? '' : 'color: inherit;'}">
                                    <p class="text-xs font-bold mb-1">Projects:</p>
                                    ${uniqueProjects.map(proj => `
                                        <div class="text-xs ${isOver(r) ? 'text-gray-200' : 'text-gray-700'} pl-2">• ${proj}</div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>`;
        }

        function renderGroups() {
            const byGroup = {};
            rawData.forEach(row => {
                if (!byGroup[row.Group]) byGroup[row.Group] = [];
                const name = row['Resource _Name'];
                if (!byGroup[row.Group].includes(name)) {
                    byGroup[row.Group].push(name);
                }
            });

            return `<div class="space-y-3" style="font-family: Arial;">
                <div class="mb-4 flex justify-between items-center">
                    <h3 class="text-lg font-bold">Groups</h3>
                    <button onclick="exportGroups()" class="bg-gold text-black px-3 py-1 rounded text-xs font-bold hover:opacity-90">📥 Export</button>
                </div>
                ${Object.entries(byGroup).sort((a,b) => b[1].length - a[1].length).map(([group, resources]) => {
                    const groupOver = data.filter(d => d.groups.includes(group) && isOver(d)).length;
                    return `
                        <div class="bg-white border-l-4 border-sky-400 rounded shadow">
                            <button onclick="this.parentElement.querySelector('[data-group-detail]').classList.toggle('hidden')" class="w-full p-3 flex justify-between items-center hover:bg-canvas font-bold text-left">
                                <div>
                                    <span class="text-lg">${group}</span>
                                    <p class="text-xs text-gray-600 font-normal">${resources.length} resources</p>
                                </div>
                                <div class="text-right">
                                    <span class="color-sky text-black px-2 py-1 rounded text-xs font-bold">${resources.length}</span>
                                    ${groupOver > 0 ? `<p class="text-xs color-red">⚠️ ${groupOver} over</p>` : ''}
                                </div>
                            </button>
                            <div data-group-detail class="hidden bg-canvas border-t max-h-64 overflow-y-auto">
                                ${resources.sort().map(resName => {
                                    const res = data.find(d => d.name === resName);
                                    return `<div class="p-2 border-b text-xs ${isOver(res) ? 'bg-red-50' : ''} flex justify-between">
                                        <span>${resName}</span>
                                        <span class="font-bold ${isOver(res) ? 'color-red' : 'text-green-700'}">${res.w01.toFixed(2)}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        function renderProjects() {
            const byProject = {};
            rawData.forEach(row => {
                if (!byProject[row.Project_Ref]) byProject[row.Project_Ref] = new Set();
                byProject[row.Project_Ref].add(row['Resource _Name']);
            });

            return `<div class="space-y-3" style="font-family: Arial;">
                <div class="mb-4 flex justify-between items-center">
                    <h3 class="text-lg font-bold">Projects</h3>
                    <button onclick="exportProjects()" class="bg-gold text-black px-3 py-1 rounded text-xs font-bold hover:opacity-90">📥 Export</button>
                </div>
                ${Object.entries(byProject).sort().map(([project, resourceSet]) => {
                    const resources = Array.from(resourceSet).sort();
                    const projOver = data.filter(d => d.groups.some(g => resources.includes(d.name)) && isOver(d)).length;
                    return `
                        <div class="bg-white border-l-4 border-melon rounded shadow">
                            <button onclick="this.parentElement.querySelector('[data-project-detail]').classList.toggle('hidden')" class="w-full p-3 flex justify-between items-center hover:bg-canvas font-bold text-left">
                                <div>
                                    <span class="text-lg">${project}</span>
                                    <p class="text-xs text-gray-600 font-normal">${resources.length} resources</p>
                                </div>
                                <div class="text-right">
                                    <span class="color-melon text-white px-2 py-1 rounded text-xs font-bold">${resources.length}</span>
                                </div>
                            </button>
                            <div data-project-detail class="hidden bg-canvas border-t max-h-64 overflow-y-auto">
                                ${resources.map(resName => {
                                    const res = data.find(d => d.name === resName);
                                    return `<div class="p-2 border-b text-xs ${isOver(res) ? 'bg-red-50' : ''} flex justify-between">
                                        <span>${resName}</span>
                                        <span class="font-bold ${isOver(res) ? 'color-red' : 'text-green-700'}">${res.w01.toFixed(2)}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        function renderOverallocated() {
            const over = data.filter(d => isOver(d));
            return `<div class="space-y-2" style="font-family: Arial;">
                <div class="flex justify-between items-center mb-4">
                    <div class="color-red border-2 p-3 rounded flex-1" style="margin-right: 16px;">
                        <p class="font-bold text-lg">${over.length} OVER-ALLOCATED RESOURCES (${((over.length/data.length)*100).toFixed(1)}%)</p>
                    </div>
                    <button onclick="exportOverallocated()" class="color-gold text-black px-4 py-3 rounded text-xs font-bold hover:opacity-90 whitespace-nowrap">📥 Export</button>
                </div>
                <div class="space-y-2 max-h-screen overflow-y-auto">
                    ${over.map(d => {
                        const email = rawData.find(row => row['Resource _Name'] === d.name)?.Resource || 'N/A';
                        const projects = [...new Set(rawData.filter(row => row['Resource _Name'] === d.name).map(row => row.Project_Ref))].join('; ');
                        return `
                            <div class="text-white p-3 rounded text-xs" style="background-color: #D14600;">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-bold text-sm">${d.name}</p>
                                        <p class="text-gray-200 text-xs mb-1">${email}</p>
                                        <p class="text-gray-300 text-xs"><strong>Projects:</strong> ${projects}</p>
                                    </div>
                                    <p class="font-bold text-lg ml-3">${d.w01.toFixed(2)}</p>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>`;
        }

        function render() {
            if (data.length === 0) {
                document.getElementById('content').innerHTML = '<div class="bg-white p-16 text-center rounded" style="font-family: Arial;"><p class="text-gray-600 text-2xl">📁 Upload Excel File</p></div>';
                return;
            }

            let content = '';
            if (activeTab === 1) content = renderExecutive();
            else if (activeTab === 2) content = renderResources();
            else if (activeTab === 3) content = renderGroups();
            else if (activeTab === 4) content = renderProjects();
            else if (activeTab === 5) content = renderOverallocated();

            document.getElementById('content').innerHTML = content;

            if (activeTab === 1) drawCharts();
        }

        document.getElementById('app').innerHTML = `
            <div class="min-h-screen bg-canvas" style="font-family: Arial;">
                <div class="color-midnight p-6 sticky top-0 z-40 shadow-lg">
